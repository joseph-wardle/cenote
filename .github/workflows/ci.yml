# Lean CI: format, lint, build, non-GPU tests.
# Rendering needs a GPU that runners don't have — golden-image tests detect
# this and skip; they run locally as the documented pre-push ritual.
# cargo build runs slangc over every kernel (crates/cenote/build.rs), so
# shader breakage fails CI even without a GPU. The slangc version is pinned
# below; bump it deliberately, together with the local install.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SLANG_VERSION: "2026.9.1"
      OIDN_RELEASE: "2.4.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install slangc (pinned)
        run: |
          curl -fsSL -o /tmp/slang.tar.gz \
            "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz"
          mkdir -p "$HOME/.slang"
          tar -xzf /tmp/slang.tar.gz -C "$HOME/.slang"
          echo "$HOME/.slang/bin" >> "$GITHUB_PATH"
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      # The denoise feature links OpenImageDenoise, whose CPU device needs
      # no GPU — so CI can lint every crate with the feature on and push a
      # real image through the real filter. Ubuntu doesn't package OIDN;
      # the official release is pinned here the same way slangc is above.
      - name: Install OpenImageDenoise (pinned)
        run: |
          curl -fsSL -o /tmp/oidn.tar.gz \
            "https://github.com/RenderKit/oidn/releases/download/v${OIDN_RELEASE}/oidn-${OIDN_RELEASE}.x86_64.linux.tar.gz"
          mkdir -p "$HOME/.oidn"
          tar -xzf /tmp/oidn.tar.gz -C "$HOME/.oidn" --strip-components=1
          echo "OIDN_DIR=$HOME/.oidn" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/.oidn/lib" >> "$GITHUB_ENV"
      - name: Clippy (denoise feature)
        run: cargo clippy --workspace --all-targets --features cenote/denoise,cenote-cli/denoise,cenote-viewer/denoise -- -D warnings
      - name: Test (denoise feature, CPU device)
        run: cargo test -p cenote --features denoise denoise
